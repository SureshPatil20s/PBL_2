<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Random Meal Planner{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="{{ url_for('home') }}" class="brand-logo">🍽️ Meal Planner</a>
            </div>
            <ul class="navbar-menu" id="navbarMenu">
                <li><a href="{{ url_for('home') }}" class="nav-link">Home</a></li>
                {% if is_logged_in %}
                    <li><a href="#" class="nav-link">My Meals</a></li>
                    <li><a href="{{ url_for('logout') }}" class="nav-link logout-btn">Logout</a></li>
                {% else %}
                    <li><a href="{{ url_for('login') }}" class="nav-link">Login</a></li>
                    <li><a href="{{ url_for('register') }}" class="nav-link register-btn">Register</a></li>
                {% endif %}
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 Random Meal Planner. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
